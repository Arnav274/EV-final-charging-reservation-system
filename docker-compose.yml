services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: evdb
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: evpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evuser -d evdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://evuser:evpass@db:5432/evdb
      OSRM_BASE_URL: http://osrm:5000
      JWT_SECRET_KEY: dev-not-for-production-change-me
      OPENCHARGEMAP_API_KEY: ${OPENCHARGEMAP_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      osrm:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  osrm-prep:
    image: ghcr.io/project-osrm/osrm-backend:latest
    working_dir: /data
    volumes:
      - osrmdata:/data
    command: >
      sh -lc "
      if [ ! -f /data/london.osrm.mldgr ]; then
        echo 'Downloading London OSM extract...';
        wget -q -O /data/london.osm.pbf https://download.geofabrik.de/europe/united-kingdom/england/greater-london-latest.osm.pbf;
        echo 'Extracting...';
        osrm-extract -p /opt/car.lua /data/london.osm.pbf;
        echo 'Partitioning...';
        osrm-partition /data/london.osrm;
        echo 'Customizing...';
        osrm-customize /data/london.osrm;
      else
        echo 'OSRM data already prepared.';
      fi
      "

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    working_dir: /data
    depends_on:
      osrm-prep:
        condition: service_completed_successfully
    volumes:
      - osrmdata:/data
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/london.osrm

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  pgdata:
  osrmdata:
